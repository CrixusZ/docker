version: '3'
services:
  llmops-ui:
    image: llmops-ui:0.1.0
    build:
      context: ../llmops-frontend
      dockerfile: Dockerfile
    container_name: llmops-frontend
    restart: always
    environment: []
    ports:
      - "3000:3000"
  llmops-api:
    image: llmops-api:0.1.0
    build:
      context: ../llmops-api
      dockerfile: Dockerfile
    container_name: llmops-api
    restart: always
    env_file:
      - .env 
    volumes:
      - ./volumes/app/storage:/app/api/storage
    environment: 
      # 模式为API，代表启用API服务
      MODE: api
      SERVER_WORKER_AMOUNT: 2
      SERVER_THREAD_AMOUNT: 2
      # 数据库迁移配置
      MIGRATION_ENABLED: 'true'
      # JWT加密秘钥
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # CSRF校验开关
      WTF_CSRF_ENABLED: 'false'
      # SQLAlchemy数据库配置
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI}
      SQLALCHEMY_POOL_SIZE: 30
      SQLALCHEMY_POOL_RECYCLE: 3600
      SQLALCHEMY_ECHO: 'true'
      # Redis缓存数据库配置
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_USE_SSL: 'false'
      # Weaviate向量数据库配置
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY}
      WEAVIATE_URL: ${WEAVIATE_URL}
      # 腾讯云COS对象存储
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ap-guangzhou
      COS_SCHEME: https
      COS_BUCKET: ${COS_BUCKET}
      COS_DOMAIN: ''
      # Celery异步队列任务配置
      CELERY_BROKER_DB: 1
      CELERY_RESULT_BACKEND_DB: 1
      CELERY_TASK_IGNORE_RESULT: 'true'
      CELERY_RESULT_EXPIRES: 3600
      CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: 'true'
      # Github OAuth应用秘钥
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      # LangSmith配置
      LANGSMITH_TRACING: 'true'
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: LLMOpsDev
      # HuggingFace配置
      TRANSFORMERS_OFFLINE: 1
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN}
      # 辅助Agent智能体应用id标识
      ASSISTANT_AGENT_ID: ${ASSISTANT_AGENT_ID}
      # OpenAI服务提供者
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: https://api.moonshot.cn/v1
      OPENAI_API_MODEL: kimi-k2-0905-preview
      # 月之暗面服务提供者
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      # 高德工具API秘钥
      GAODE_API_KEY: ${GAODE_API_KEY}
      #serpapi key
      SERPER_API_KEY: ${SERPER_API_KEY}
    ports:
      - "5001:5001"
    depends_on:
      - llmops-db
      - llmops-redis
      - llmops-weaviate
  llmops-celery:
    image: llmops-api:0.1.0
    build:
      context: ../llmops-api
      dockerfile: Dockerfile
    container_name: llmops-celery
    restart: always
    volumes:
      - ./volumes/app/storage:/app/api/storage
    environment: 
      # 模式为celery，代表启用celery异步任务队列
      MODE: celery
      CELERY_WORKER_AMOUNT: 2
      # 数据库迁移配置
      MIGRATION_ENABLED: 'false'
      # JWT加密秘钥
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # CSRF校验开关
      WTF_CSRF_ENABLED: 'false'
      # SQLAlchemy数据库配置
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI}
      SQLALCHEMY_POOL_SIZE: 30
      SQLALCHEMY_POOL_RECYCLE: 3600
      SQLALCHEMY_ECHO: 'true'
      # Redis缓存数据库配置
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_USE_SSL: 'false'
      # Weaviate向量数据库配置
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY}
      WEAVIATE_URL: ${WEAVIATE_URL}
      # 腾讯云COS对象存储
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ap-guangzhou
      COS_SCHEME: https
      COS_BUCKET: ${COS_BUCKET}
      COS_DOMAIN: ''
      # Celery异步队列任务配置
      CELERY_BROKER_DB: 1
      CELERY_RESULT_BACKEND_DB: 1
      CELERY_TASK_IGNORE_RESULT: 'true'
      CELERY_RESULT_EXPIRES: 3600
      CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: 'true'
      # Github OAuth应用秘钥
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      # LangSmith配置
      LANGSMITH_TRACING: 'true'
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: LLMOpsDev
      # HuggingFace配置
      TRANSFORMERS_OFFLINE: 1
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN}
      # 辅助Agent智能体应用id标识
      ASSISTANT_AGENT_ID: ${ASSISTANT_AGENT_ID}
      # OpenAI服务提供者
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: https://api.moonshot.cn/v1
      OPENAI_API_MODEL: kimi-k2-0905-preview
      # 月之暗面服务提供者
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      # 高德工具API秘钥
      GAODE_API_KEY: ${GAODE_API_KEY}
      #serpapi key
      SERPER_API_KEY: ${SERPER_API_KEY}
    depends_on:
      - llmops-db
      - llmops-redis
      - llmops-weaviate
  llmops-redis:
    image: redis:6-alpine
    restart: always
    container_name: llmops-redis
    volumes:
      - ./volumes/redis/data:/data
    # 启动redis服务是配置
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "6379:6379"
  llmops-db:
    image: postgres:15-alpine
    restart: always
    container_name: llmops-db
    environment: 
      # 配置默认的账户名，账号密码，默认数据库，数据存储的位置
      PGUSER: ${PGUSER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: llmops
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes: 
      # 将postgres数据挂载到本地./volumes/db/data目录下
      - ./volumes/db/data:/var/lib/postgresql/data/pgdata
      # 初始化脚步只有在空数据挂载的情况下才会触发执行(.sql/.sh等)，如果已经存在数据则不会执行
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # 每隔一s发起一个健康测试，最多重试30次
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 60s
    ports:
      - "5432:5432"
  llmops-weaviate:
    image: semitechnologies/weaviate:1.28.4
    container_name: llmops-weaviate
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25  # 查询默认返回的数据条数
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"  # 关闭匿名访问，需要授权才能和weaviate交互
      PERSISTENCE_DATA_PATH: /var/lib/weaviate  # 数据持久化路径
      DEFAULT_VECTORIZER_MODULE: "none"  # 向量化模块设置为none
      CLUSTER_HOSTNAME: "node1"  # 节点集群主机名
      AUTHENTICATION_APIKEY_ENABLED: "true"  # 启用API密钥认证
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}  # 允许的API秘钥列表
      AUTHENTICATION_APIKEY_USERS: 'zengjiahao1989@163.com'  # 基于秘钥的API身份列表
      AUTHORIZATION_ADMINLIST_ENABLED: 'true'  # 启动AdminList授权方案
      AUTHORIZATION_ADMINLIST_USERS: 'zengjiahao1989@163.com'  # 使用AdminList方案时具有管理权限的用户
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
  llmops-nginx:
    image: nginx:latest
    restart: always
    container_name: llmops-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/ssl
    depends_on:
      - llmops-ui
      - llmops-api
    ports:
      - "80:80"
      - "443:443"    
